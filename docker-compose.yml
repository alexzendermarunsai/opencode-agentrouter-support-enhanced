services:
  agentrouter-proxy:
    build: .
    container_name: agentrouter-proxy
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - PROXY_API_KEY=${PROXY_API_KEY}
    restart: unless-stopped
    networks:
      - 9router_default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  9router_default:
    external: true
